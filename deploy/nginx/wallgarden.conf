# Drop into /etc/nginx/sites-available/wallgarden, then:
#   sudo ln -s ../sites-available/wallgarden /etc/nginx/sites-enabled/wallgarden
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    server_name wallgarden.local;

    # LAN-only — block requests from outside the local network.
    allow 192.168.0.0/16;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    deny  all;

    location / {
        proxy_pass         http://127.0.0.1:3100;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 60s;
    }

    # Daemon writes JPEGs here; Rails serves them via PhotosController#show.
    # We could also serve directly, but this keeps the auth check.
    location /photos/files/ {
        internal;
        alias /var/lib/wallgarden/photos/;
    }
}
