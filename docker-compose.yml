services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wallgarden_postgres
    environment:
      POSTGRES_USER: wallgarden
      POSTGRES_PASSWORD: wallgarden
      POSTGRES_DB: wallgarden_development
    # Use 5433 on the host so we don't collide with a brew-installed Postgres
    # that's already on 5432 (culinari's setup). DATABASE_URL in .env points here.
    ports:
      - "5433:5432"
    volumes:
      - wallgarden_pg_data:/var/lib/postgresql/data
      - ./shared/init-pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallgarden -d wallgarden_development"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  wallgarden_pg_data:
